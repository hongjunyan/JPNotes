services:
  backend:
    build: ./backend
    env_file:
      - path: .env
        required: false
    environment:
      DATA_DIR: /app/data
    volumes:
      - ./db_data:/app/data
    expose:
      - "8000"
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "${APP_PORT:-8080}:80"
    depends_on:
      - backend
    restart: unless-stopped
