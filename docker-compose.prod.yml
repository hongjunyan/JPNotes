# Production deployment using registry images
# Usage:
#  docker compose -f docker-compose.prod.yml up -d
services:
  backend:
    image: hongjunyan/jpnotes-backend:v1.0.0
    env_file:
      - path: .env
        required: false
    environment:
      DATA_DIR: /app/data
    volumes:
      - ./db_data:/app/data
    expose:
      - "8000"
    restart: unless-stopped

  frontend:
    image: hongjunyan/jpnotes-frontend:v1.0.0
    ports:
      - "${APP_PORT:-8080}:80"
    depends_on:
      - backend
    restart: unless-stopped
